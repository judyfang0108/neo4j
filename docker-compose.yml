services:
  neo4j:
    image: neo4j:5.23
    container_name: neo4j
    ports:
      - "7474:7474"   # HTTP / Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/testpassword
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  build_graph:
    build: .
    container_name: build_graph
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
    volumes:
      - ./schema.json:/app/schema.json:ro

volumes:
  neo4j_data:
